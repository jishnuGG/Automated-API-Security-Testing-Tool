<!DOCTYPE html>
<html>

<head>
    <title>API Security Monitor</title>
    <style>
        body {
            width: 300px;
            padding: 10px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h3 {
            margin-top: 0;
            color: #333;
        }

        .status {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            text-align: center;
            font-weight: bold;
        }

        .safe {
            background-color: #d4edda;
            color: #155724;
        }

        .risk {
            background-color: #f8d7da;
            color: #721c24;
        }

        .log-container {
            max-height: 200px;
            overflow-y: auto;
            border-top: 1px solid #eee;
        }

        .log-item {
            font-size: 12px;
            padding: 5px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 8px;
            background-color: #007bff;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 4px;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>
    <h3>API Security Monitor</h3>
    <div id="status" class="status safe">Monitoring Active</div>

    <div class="log-container" id="log-list">
        <!-- Logs appear here -->
    </div>

    <a href="http://localhost:5173" target="_blank" class="btn">Open Dashboard</a>

    <script src="popup.js"></script>
</body>

</html>
